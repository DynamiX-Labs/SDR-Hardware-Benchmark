# SDR Hardware Profiles
# DynamiX Labs — SatSDR-Universal

rtlsdr:
  driver: rtlsdr
  max_sample_rate: 2.4e6
  min_frequency: 24e6
  max_frequency: 1766e6
  gain_range: [0, 49.6]
  recommended_gain: 30
  notes: "Enable bias-T for LNA with rtlsdr_bias_tee"

hackrf:
  driver: hackrf
  max_sample_rate: 20e6
  min_frequency: 1e6
  max_frequency: 6000e6
  gain_range: [0, 62]
  recommended_gain: 40
  notes: "Enable amplifier for weak signals"

pluto:
  driver: plutosdr
  max_sample_rate: 20e6
  min_frequency: 325e6
  max_frequency: 3800e6
  gain_range: [0, 73]
  recommended_gain: 50
  notes: "Excellent for L-band (1-2 GHz)"

usrp_b200:
  driver: uhd
  max_sample_rate: 56e6
  min_frequency: 70e6
  max_frequency: 6000e6
  gain_range: [0, 76]
  recommended_gain: 40
  notes: "Best single-channel research platform"
